<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsyx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .logo { font-family: 'Space Grotesk', sans-serif; }
        
        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        .menu-preview {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .menu-preview:hover {
            transform: perspective(1200px) rotateX(12deg) rotateY(18deg) scale(1.08);
            box-shadow: 0 40px 60px -15px rgba(0, 255, 159, 0.4);
        }
        
        .light body {
            background: #f8fafc;
            color: #0f172a;
        }
        
        .light .accent { color: #10b981; }
        .light .bg-zinc-900 { background: white; border-color: #e2e8f0; }
    </style>
</head>
<body class="bg-black text-white">
    <canvas id="canvas"></canvas>

    <nav class="fixed top-0 w-full bg-black/95 backdrop-blur-md border-b border-zinc-800 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <span class="text-3xl font-bold tracking-tighter text-emerald-400 logo">PULSYX</span>
            <div class="flex items-center gap-x-10 text-sm font-medium">
                <a href="#hero" class="hover:text-emerald-400 transition-colors cursor-pointer">Menu</a>
                <a href="#download" class="hover:text-emerald-400 transition-colors cursor-pointer">Download</a>
                <button onclick="toggleTheme()" id="theme-toggle" class="text-2xl hover:text-emerald-400 transition-colors">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section id="hero" class="min-h-screen flex items-center pt-20">
        <div class="max-w-screen-2xl mx-auto px-8 grid md:grid-cols-2 gap-20 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-3 bg-zinc-900 border border-emerald-900 px-6 py-3 rounded-3xl">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-ping"></div>
                    <span class="text-emerald-400 uppercase tracking-widest text-sm font-medium">Undetected</span>
                </div>
                
                <h1 class="text-7xl font-black tracking-tighter logo leading-none">
                    PULSYX<br>
                    <span class="text-emerald-400">ROBLOX EXTERNAL</span>
                </h1>
                
                <p class="text-2xl text-zinc-400">No account required • No payment • Just pure performance.</p>
                
                <div class="flex items-center gap-x-6 pt-6">
                    <button onclick="document.getElementById('download').scrollIntoView({behavior: 'smooth'})" 
                            class="bg-emerald-400 hover:bg-white text-black font-bold text-xl px-10 py-5 rounded-2xl flex items-center gap-x-3 transition-all">
                        <i class="fas fa-download"></i>
                        DOWNLOAD
                    </button>
                    
                    <a href="https://discord.gg/Ce33j2VdNg" target="_blank" 
                       class="border border-zinc-700 hover:border-white px-8 py-5 rounded-2xl flex items-center gap-x-3 text-3xl transition-all">
                        <i class="fab fa-discord"></i>
                    </a>
                </div>
            </div>
            
            <div class="flex justify-center">
                <div class="menu-preview border border-zinc-700 rounded-3xl overflow-hidden shadow-2xl">
                    <img src="menu.png" alt="Pulsyx Menu" class="max-w-lg">
                </div>
            </div>
        </div>
    </section>

    <!-- Download -->
    <section id="download" class="py-32">
        <div class="max-w-2xl mx-auto px-8 text-center">
            <div class="bg-zinc-900 rounded-3xl p-16 border border-zinc-700">
                <h2 class="text-6xl font-bold mb-4">Ready?</h2>
                <p class="text-zinc-400 text-xl mb-12">Download Pulsyx and start dominating.</p>
                <a href="https://cdn.discordapp.com/attachments/1301237430841643090/1525893210310836305/Pulsyx-1.0.zip?ex=6a550a4b&is=6a53b8cb&hm=47b1a1af33bdeb32ef009f223815761095cd7dedacb04d091e3b7679d9c03275&">
                    <button class="bg-emerald-400 text-black font-bold text-3xl px-16 py-8 rounded-3xl w-full hover:bg-white transition-all">
                        DOWNLOAD EXTERNAL
                    </button>
                </a>
            </div>
        </div>
    </section>

    <footer class="py-8 text-center text-zinc-500 text-sm">
        Pulsyx.wtf
    </footer>

    <script>
        // Particles
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1.6 + 0.6;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) {
                    this.y = 0;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = '#00ff9f';
                ctx.globalAlpha = 0.75;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        
        window.onload = () => {
            resizeCanvas();
            for (let i = 0; i < 300; i++) particles.push(new Particle());
            animate();
            window.addEventListener('resize', resizeCanvas);
            
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                });
            });
        };
        
        function startDownload() {
            // Handled by the <a download> tag
        }
        
        function toggleTheme() {
            document.documentElement.classList.toggle('light');
            const icon = document.querySelector('#theme-toggle i');
            if (document.documentElement.classList.contains('light')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }
    </script>
</body>
</html>
